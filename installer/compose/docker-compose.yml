name: synapse

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-synapse} -d $${POSTGRES_DB:-synapse}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  backend:
    build:
      context: ../..
      dockerfile: packages/core/Dockerfile
    environment:
      SERVER_PORT: 8080
      SYSTEM_NAME: ${SYSTEM_NAME:-SYNAPSE}
      SYNAPSE_AGENTS_PATH: /app/agents
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-synapse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-synapse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-synapse_dev_password}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-dev_key_32_bytes_change_me_now!!}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_THIS_MUST_BE_AT_LEAST_256_BITS_LONG_FOR_HS256}
      ECHO_ENABLED: ${ECHO_ENABLED:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SYNAPSE_STORE_REGISTRY_PATH: /app/store/registry.yml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../agents:/app/agents:ro
      - ../../store:/app/store:ro

  dashboard:
    build:
      context: ../../packages/dashboard/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-models
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres18-data:
  redis-data:
  qdrant-data:
  ollama-data:
