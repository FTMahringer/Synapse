name: synapse

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  backend:
    build:
      context: ../../packages/core
    environment:
      SERVER_PORT: 8080
      SYSTEM_NAME: ${SYSTEM_NAME:-SYNAPSE}
      SYNAPSE_VERSION: ${SYNAPSE_VERSION:-v1.0.0-dev}
      SYNAPSE_AGENTS_PATH: /app/agents
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-synapse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-synapse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-synapse_dev_password}
      ECHO_ENABLED: ${ECHO_ENABLED:-true}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../agents:/app/agents:ro

  dashboard:
    build:
      context: ../../packages/dashboard/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-models
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  ollama-data:
