name: synapse-prod

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-synapse} -d $${POSTGRES_DB:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - synapse

  redis:
    image: redis:8
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - synapse

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - synapse

  backend:
    build:
      context: ../../packages/core
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SYSTEM_NAME: ${SYSTEM_NAME:-SYNAPSE}
      SYNAPSE_VERSION: ${SYNAPSE_VERSION:-v1.0.0}
      SYNAPSE_AGENTS_PATH: /app/agents
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-synapse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-synapse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ECHO_ENABLED: ${ECHO_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../agents:/app/agents:ro
    networks:
      - synapse

  dashboard:
    build:
      context: ../../packages/dashboard/frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - synapse

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - local-models
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - synapse

networks:
  synapse:

volumes:
  postgres18-data:
  redis-data:
  qdrant-data:
  ollama-data:
