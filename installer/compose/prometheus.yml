global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'synapse-local'

scrape_configs:
  - job_name: 'synapse-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'synapse-core'
