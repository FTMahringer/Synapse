name: Create milestone release

on:
  push:
    tags:
      - v0.*.0
  workflow_dispatch:
    inputs:
      tag:
        description: Milestone tag to release, such as v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.eventName === 'workflow_dispatch'
              ? core.getInput('tag', { required: true }).trim()
              : context.ref.replace('refs/tags/', '');

            if (!/^v0\.\d+\.0$/.test(tag)) {
              core.info(`Skipping non-milestone tag: ${tag}`);
              return;
            }

            const notesPath = `docs/release-notes/${tag}.md`;
            const ref = context.eventName === 'workflow_dispatch'
              ? context.payload.repository.default_branch
              : tag;

            const file = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: notesPath,
              ref,
            });

            if (!file.data || !file.data.content) {
              throw new Error(`Unable to read ${notesPath} at ref ${ref}`);
            }

            const body = Buffer.from(file.data.content, file.data.encoding || 'base64').toString('utf8');
            const firstHeading = body.match(/^#\s+(.+)$/m);
            const releaseName = firstHeading ? firstHeading[1].trim() : tag;

            let existingRelease = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              existingRelease = response.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (existingRelease) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id,
                name: releaseName,
                body,
                draft: false,
                prerelease: true,
              });
              core.info(`Updated release ${tag}`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease: true,
                generate_release_notes: false,
              });
              core.info(`Created release ${tag}`);
            }

            core.summary
              .addHeading('Milestone release')
              .addRaw(`Tag: \`${tag}\`\n\n`)
              .addRaw(`Notes: \`${notesPath}\`\n`)
              .write();
