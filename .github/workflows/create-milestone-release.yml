name: Create milestone release

on:
  push:
    branches:
      - main
    tags:
      - v*.*.0
    paths:
      - docs/release-notes/**
      - .github/workflows/create-milestone-release.yml
  workflow_dispatch:
    inputs:
      tag:
        description: Milestone tag to release, such as v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release
        uses: actions/github-script@v9
        with:
          script: |
            const defaultBranch = context.payload.repository.default_branch;

            async function collectTags() {
              if (context.eventName === 'workflow_dispatch') {
                return [core.getInput('tag', { required: true }).trim()];
              }

              if (context.ref.startsWith('refs/tags/')) {
                return [context.ref.replace('refs/tags/', '')];
              }

              const directory = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/release-notes',
                ref: defaultBranch,
              });

              if (!Array.isArray(directory.data)) {
                throw new Error('docs/release-notes must be a directory.');
              }

              return directory.data
                .filter((entry) => entry.type === 'file')
                .map((entry) => entry.name.match(/^(v\d+\.\d+\.0)\.md$/))
                .filter(Boolean)
                .map((match) => match[1]);
            }

            async function tagExists(tag) {
              try {
                await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                });
                return true;
              } catch (error) {
                if (error.status === 404) {
                  return false;
                }
                throw error;
              }
            }

            async function syncRelease(tag) {
              if (!/^v\d+\.\d+\.0$/.test(tag)) {
                core.info(`Skipping non-milestone tag: ${tag}`);
                return { tag, status: 'skipped' };
              }

              if (!(await tagExists(tag))) {
                core.info(`Skipping ${tag}; tag does not exist.`);
                return { tag, status: 'missing-tag' };
              }

              const notesPath = `docs/release-notes/${tag}.md`;
              const ref = context.ref.startsWith('refs/tags/') ? tag : defaultBranch;

              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: notesPath,
                ref,
              });

              if (!file.data || !file.data.content) {
                throw new Error(`Unable to read ${notesPath} at ref ${ref}`);
              }

              const body = Buffer.from(file.data.content, file.data.encoding || 'base64').toString('utf8');
              const firstHeading = body.match(/^#\s+(.+)$/m);
              const releaseName = firstHeading ? firstHeading[1].trim() : tag;

              let existingRelease = null;
              try {
                const response = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                existingRelease = response.data;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              const prerelease = /^v0\./.test(tag);

              if (existingRelease) {
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: existingRelease.id,
                  name: releaseName,
                  body,
                  draft: false,
                  prerelease,
                });
                core.info(`Updated release ${tag}`);
                return { tag, status: 'updated' };
              }

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease,
                generate_release_notes: false,
              });
              core.info(`Created release ${tag}`);
              return { tag, status: 'created' };
            }

            const tags = [...new Set(await collectTags())].sort();
            const results = [];

            for (const tag of tags) {
              results.push(await syncRelease(tag));
            }

            core.summary
              .addHeading('Milestone release')
              .addTable([
                [{ data: 'Tag', header: true }, { data: 'Status', header: true }],
                ...results.map((result) => [result.tag, result.status]),
              ])
              .write();
