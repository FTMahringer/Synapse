name: Roadmap task
description: Track implementation work from the SYNAPSE roadmap.
title: "[roadmap] "
labels:
  - roadmap:status-planned
body:
  - type: markdown
    attributes:
      value: |
        Use this template for work that maps to `docs/roadmaps/SYNAPSE_IMPLEMENTATION_ROADMAP.md`.
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase
      description: Select the phase label that should be applied to this task.
      options:
        - roadmap:phase-foundation
        - roadmap:phase-backend
        - roadmap:phase-agents
        - roadmap:phase-plugins
        - roadmap:phase-store
        - roadmap:phase-docs
        - roadmap:phase-installer
        - roadmap:phase-cli
        - roadmap:phase-runtime
        - roadmap:phase-hardening
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Roadmap version
      description: Use the milestone or patch version, such as v0.2.0 or v0.2.1.
      placeholder: v0.2.0
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What will change in this task?
      placeholder: Describe the implementation slice and its boundary.
    validations:
      required: true
  - type: textarea
    id: exit-criteria
    attributes:
      label: Exit criteria
      description: What must be true before this task is done?
      placeholder: List the validation points from the roadmap phase.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Which checks, tests, or reviews will prove this is complete?
      placeholder: List commands or review steps.
    validations:
      required: true
