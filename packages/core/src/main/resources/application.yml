server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

spring:
  application:
    name: synapse-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/synapse}
    username: ${SPRING_DATASOURCE_USERNAME:synapse}
    password: ${SPRING_DATASOURCE_PASSWORD:synapse_dev_password}
    hikari:
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:25}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:3s}
      lettuce:
        pool:
          enabled: true
          max-active: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE:32}
          max-idle: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE:16}
          min-idle: ${SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE:4}
          max-wait: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_WAIT:2s}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      version: ${synapse.version}

synapse:
  system-name: ${SYSTEM_NAME:SYNAPSE}
  version: ${SYNAPSE_VERSION:v1.0.0}
  agents-path: ${SYNAPSE_AGENTS_PATH:agents}
  store:
    registry-path: ${SYNAPSE_STORE_REGISTRY_PATH:store/registry.yml}
  echo:
    enabled: ${ECHO_ENABLED:true}
    debug-only: true
    activation: manual
  http:
    connect-timeout-seconds: ${SYNAPSE_HTTP_CONNECT_TIMEOUT_SECONDS:10}
    pool:
      max-threads: ${SYNAPSE_HTTP_POOL_MAX_THREADS:64}
  memory:
    auto-promote:
      reuse-threshold: ${SYNAPSE_MEMORY_AUTO_PROMOTE_REUSE_THRESHOLD:5}
    lifecycle:
      knowledge-compaction-days: ${SYNAPSE_MEMORY_KNOWLEDGE_COMPACTION_DAYS:30}
      monthly-knowledge-cron: "${SYNAPSE_MEMORY_MONTHLY_KNOWLEDGE_CRON:0 0 3 1 * *}"
      bimonthly-archive-cron: "${SYNAPSE_MEMORY_BIMONTHLY_ARCHIVE_CRON:0 0 3 1 */2 *}"
  tools:
    enabled: ${SYNAPSE_TOOLS_ENABLED:true}
    execution-timeout-ms: ${SYNAPSE_TOOLS_EXECUTION_TIMEOUT_MS:10000}
    cache:
      enabled: ${SYNAPSE_TOOLS_CACHE_ENABLED:true}
      default-ttl-seconds: ${SYNAPSE_TOOLS_CACHE_DEFAULT_TTL_SECONDS:300}
