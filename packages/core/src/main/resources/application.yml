server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

spring:
  application:
    name: synapse-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/synapse}
    username: ${SPRING_DATASOURCE_USERNAME:synapse}
    password: ${SPRING_DATASOURCE_PASSWORD:synapse_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      version: ${synapse.version}

synapse:
  system-name: ${SYSTEM_NAME:SYNAPSE}
  version: ${SYNAPSE_VERSION:v1.0.0}
  agents-path: ${SYNAPSE_AGENTS_PATH:agents}
  store:
    registry-path: ${SYNAPSE_STORE_REGISTRY_PATH:store/registry.yml}
  echo:
    enabled: ${ECHO_ENABLED:true}
    debug-only: true
    activation: manual
