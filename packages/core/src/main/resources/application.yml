server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: synapse-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/synapse}
    username: ${SPRING_DATASOURCE_USERNAME:synapse}
    password: ${SPRING_DATASOURCE_PASSWORD:synapse_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      version: ${synapse.version}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}, correlationId=%X{correlationId:-}]"

synapse:
  system-name: ${SYSTEM_NAME:SYNAPSE}
  version: ${SYNAPSE_VERSION:v1.0.0}
  agents-path: ${SYNAPSE_AGENTS_PATH:agents}
  store:
    registry-path: ${SYNAPSE_STORE_REGISTRY_PATH:store/registry.yml}
  echo:
    enabled: ${ECHO_ENABLED:true}
    debug-only: true
    activation: manual
