server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: synapse-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/synapse}
    username: ${SPRING_DATASOURCE_USERNAME:synapse}
    password: ${SPRING_DATASOURCE_PASSWORD:synapse_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

synapse:
  system-name: ${SYSTEM_NAME:SYNAPSE}
  version: ${SYNAPSE_VERSION:v1.0.0-dev}
  agents-path: ${SYNAPSE_AGENTS_PATH:agents}
  echo:
    enabled: ${ECHO_ENABLED:true}
    debug-only: true
    activation: manual
