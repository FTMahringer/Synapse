  - id: ollama
    name: Ollama
    type: model
    source: official
    version: 1.0.0
    min_synapse: ">=0.4.0"
    author: synapse-core
    license: MIT
    tags: [llm, model, local, self-hosted]
    description: "Adds local Ollama model provider support."

bundles:
  - id: developer-workspace
