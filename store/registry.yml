    name: Official Store
    type: curated
    trust_level: verified
    url: https://store.synapse.dev/official
    refresh_interval_hours: 24
    submission_policy: invite-only
  community:
    name: Community Store
    type: github
    trust_level: community
    repository: https://github.com/synapse-community/bundles
    refresh_interval_hours: 6
    submission_policy: pull-request
